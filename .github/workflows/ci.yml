name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libadwaita-1-dev \
            libatspi2.0-dev \
            libclang-dev \
            libgirepository1.0-dev \
            libglib2.0-dev \
            libgtk-4-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            libvulkan-dev \
            libxkbcommon-dev \
            pkg-config \
            tesseract-ocr

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint with clippy
        run: cargo clippy --locked -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace

      - name: Build release
        run: cargo build --locked --release
